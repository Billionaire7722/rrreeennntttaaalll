version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: rental_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rental
    ports:
      - "5434:5432"
    volumes:
      - rental_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rental_redis
    ports:
      - "6379:6379"

volumes:
  rental_pg_data:
